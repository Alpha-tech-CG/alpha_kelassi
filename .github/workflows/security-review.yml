name: Security Review

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  security:
    name: Claude Code Security Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          upload-results: true
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-model: 'claude-sonnet-4-6'
          claudecode-timeout: '20'
          custom-security-scan-instructions: '.github/security/custom-scan-instructions.txt'
          false-positive-filtering-instructions: '.github/security/false-positive-filtering.txt'
          exclude-directories: 'node_modules,dist,.next,coverage'
