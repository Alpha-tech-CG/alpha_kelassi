# Dependabot — surveille les dépendances vulnérables/obsolètes et ouvre des PR.
# Les ALERTES de sécurité (CVE) se activent en plus dans :
#   Repo GitHub → Settings → Code security → "Dependabot alerts" + "Dependabot security updates"
version: 2
updates:
  # Dépendances npm/pnpm de tout le monorepo
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
    # Regroupe les mises à jour mineures/patch en une seule PR (moins de bruit)
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Actions GitHub (ci.yml, deploy.yml, security-review.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
